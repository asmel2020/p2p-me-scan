name: Build and Deploy Chain Event Indexer

on:
  pull_request:
    branches: [master]
    paths:
      - 'apps/chain-event-indexer/**'
      - 'packages/@p2p-me/db/**'
      - '.github/workflows/chain-event-indexer.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Preset Image Name
        run: echo "IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-indexer:$(echo ${{ github.sha }} | cut -c1-7) | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/chain-event-indexer/Dockerfile
          push: true
          tags: ${{ env.IMAGE_URL }}

      - name: save output
        id: build-image
        run: echo "image=$IMAGE_URL" >> $GITHUB_OUTPUT

      - uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.APP_SERVER }}
          app: ${{ secrets.APP_NAME_INDEXER }}
          token: ${{ secrets.APP_TOKEN_INDEXER }}
          image: ${{ env.IMAGE_URL }}

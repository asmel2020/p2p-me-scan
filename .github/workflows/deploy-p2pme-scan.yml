name: Deploy p2pme-scan to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - "apps/p2pme-scan/**"
      - ".github/workflows/deploy-p2pme-scan.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/p2pme-scan
        run: pnpm build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Ensure Pages project exists
        run: |
          npx wrangler pages project create p2pme-scan --production-branch master || echo "Project already exists"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/p2pme-scan/dist --project-name=p2pme-scan
